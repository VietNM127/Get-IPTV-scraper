name: IPTV Scraper Auto Update

on:
  schedule:
    # Lịch chính mỗi 10 phút
    - cron: '*/10 * * * *'
    # Lịch dự phòng lệch 5 phút để giảm rủi ro trễ lịch GitHub
    - cron: '5-59/10 * * * *'
  
  # Cho phép chạy thủ công từ GitHub Actions tab
  workflow_dispatch:

concurrency:
  group: iptv-scraper-auto-update
  cancel-in-progress: true

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run scraper
      run: |
        python scraper.py
    
    - name: Check if streams.json changed
      id: check_changes
      run: |
        git add streams.json thumbs/ 2>/dev/null || true
        if git diff --cached --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push if changed
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git commit -m "🔄 Auto update streams - $(date '+%Y-%m-%d %H:%M:%S UTC')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload streams.json as artifact
      uses: actions/upload-artifact@v4
      with:
        name: streams-json
        path: streams.json
        retention-days: 7
